<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  <title>Frontend Mentor | Results summary component</title>
</head>
<body>
  <main>
    <article class="results-card">
      <section class="result-panel" aria-labelledby="result-title">
        <h1 id="result-title">Your Result</h1>

        <div class="score-circle">
          <strong>76</strong>
          <span>of 100</span>
        </div>

        <div class="result-message">
          <h2>Great</h2>
          <p>You scored higher than 65% of the people who have taken these tests.</p>
        </div>
      </section>

      <section class="summary-panel" aria-labelledby="summary-title">
        <h2 id="summary-title">Summary</h2>

        <ul class="summary-list">
          <li class="summary-item summary-item--reaction">
            <div class="summary-label">
              <img src="./assets/images/icon-reaction.svg" alt="" aria-hidden="true">
              <span>Reaction</span>
            </div>
            <p><strong>80</strong> <span>/ 100</span></p>
          </li>

          <li class="summary-item summary-item--memory">
            <div class="summary-label">
              <img src="./assets/images/icon-memory.svg" alt="" aria-hidden="true">
              <span>Memory</span>
            </div>
            <p><strong>92</strong> <span>/ 100</span></p>
          </li>

          <li class="summary-item summary-item--verbal">
            <div class="summary-label">
              <img src="./assets/images/icon-verbal.svg" alt="" aria-hidden="true">
              <span>Verbal</span>
            </div>
            <p><strong>61</strong> <span>/ 100</span></p>
          </li>

          <li class="summary-item summary-item--visual">
            <div class="summary-label">
              <img src="./assets/images/icon-visual.svg" alt="" aria-hidden="true">
              <span>Visual</span>
            </div>
            <p><strong>73</strong> <span>/ 100</span></p>
          </li>
        </ul>

        <button class="continue-button" type="button">Continue</button>
      </section>
    </article>
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
